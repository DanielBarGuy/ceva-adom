<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אירוע אזעקה</title>


  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;background:#0d0d0d;color:#f0f0f0;display:flex;flex-direction:column}

    /* ── Header ── */
    header{background:linear-gradient(135deg,#1a0000,#2d0000,#1a0000);border-bottom:2px solid #c0392b;padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 2px 20px rgba(192,57,43,.4);flex-shrink:0}
    .back-btn{background:#1a0000;border:1px solid #c0392b;border-radius:8px;color:#ff8888;padding:6px 12px;cursor:pointer;font-size:.82rem;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .18s;white-space:nowrap}
    .back-btn:hover{background:#c0392b;color:#fff}
    .event-header{flex:1;min-width:0}
    .event-title{font-size:1.3rem;font-weight:700;color:#ff4444;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .event-title .time{direction:ltr;font-variant-numeric:tabular-nums}
    .event-title .date{color:#aaa;font-size:.85rem;font-weight:400}
    .cat-badge{display:inline-block;font-size:.72rem;background:rgba(192,57,43,.25);color:#ff9999;border:1px solid rgba(192,57,43,.4);border-radius:6px;padding:2px 9px}
    .loc-count{font-size:.8rem;color:#888;margin-top:3px}

    /* ── Map ── */
    #map{flex:1;min-height:0}

    /* ── Loading overlay ── */
    #overlay{position:absolute;inset:0;top:70px;background:rgba(13,13,13,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:1000;pointer-events:none}
    .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#c0392b;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #overlayText{font-size:.95rem;color:#ddd;text-align:center}
    #overlaySubtext{font-size:.78rem;color:#666}

    /* ── Bottom panel ── */
    #panel{flex-shrink:0;max-height:200px;overflow-y:auto;background:#111;border-top:1px solid #222;padding:10px 18px}
    .panel-title{font-size:.72rem;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
    .loc-chips{display:flex;flex-wrap:wrap;gap:6px}
    .loc-chip{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;padding:4px 10px;font-size:.8rem;color:#ddd;cursor:pointer;transition:all .15s;white-space:nowrap}
    .loc-chip:hover{border-color:#c0392b;color:#ff8888}
    .loc-chip.no-coords{color:#555;border-style:dashed}

    /* ── Google Maps InfoWindow dark theme ── */
    .gm-style .gm-style-iw-c{background:#1e1e1e!important;padding:0!important;box-shadow:0 4px 20px rgba(0,0,0,.7)!important;border-radius:10px!important;border:1px solid #444!important}
    .gm-style .gm-style-iw-d{overflow:hidden!important}
    .gm-style .gm-style-iw-t::after{background:#1e1e1e!important}
    .gm-style .gm-style-iw-tc::after{background:#1e1e1e!important}
    .gm-style button.gm-ui-hover-effect{filter:invert(1)!important}

    /* ── Legend ── */
    .map-legend{position:absolute;bottom:210px;right:14px;z-index:900;background:rgba(20,20,20,.92);border:1px solid #333;border-radius:10px;padding:9px 13px;font-size:.75rem;color:#bbb;pointer-events:none}

    @media(max-width:600px){
      header{padding:9px 12px;gap:10px}
      .event-title{font-size:1rem;gap:6px}
      .event-title .date{font-size:.78rem}
      .back-btn{padding:5px 10px;font-size:.78rem}
      .loc-count{font-size:.75rem}
      #panel{max-height:160px;padding:8px 12px}
      .loc-chip{font-size:.75rem;padding:3px 8px}
      .map-legend{bottom:170px;right:10px;font-size:.7rem;padding:7px 10px}
    }

    @media(max-width:380px){
      .event-title{flex-direction:column;align-items:flex-start;gap:3px}
      .back-btn{font-size:.75rem}
    }
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="/" onclick="history.length>1?(history.back(),false):true">← חזרה</a>
  <div class="event-header" id="eventHeader">
    <div class="event-title"><span class="spinner" style="width:22px;height:22px;border-width:2px"></span></div>
  </div>
</header>

<div style="position:relative;flex:1;display:flex;flex-direction:column">
  <div id="map"></div>
  <div id="overlay">
    <div class="spinner"></div>
    <div id="overlayText">טוען אירוע...</div>
    <div id="overlaySubtext"></div>
  </div>
  <div class="map-legend" id="legend" style="display:none">
    <div style="font-weight:600;margin-bottom:3px">🗺 אירוע זה</div>
    <div id="legendText" style="color:#888;font-size:.72rem"></div>
  </div>
</div>

<div id="panel" style="display:none">
  <div class="panel-title" id="panelTitle"></div>
  <div class="loc-chips" id="locChips"></div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBKVd483xZtL1Jd2ns5_oTBJYK88yT2WjQ"></script>
<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fmtTime(iso){ return new Date(iso).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function fmtDate(iso){ return new Date(iso).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtFull(iso){ return `${fmtDate(iso)} ${fmtTime(iso)}`; }

// ── Parse URL ─────────────────────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const alertDate = params.get('date');

if (!alertDate) {
  document.getElementById('overlayText').textContent = 'שגיאה: לא צוין תאריך אירוע';
  throw new Error('no date param');
}

// ── Map init ──────────────────────────────────────────────────────────────────
const DARK_STYLE = [
  {elementType:'geometry',stylers:[{color:'#1d2c4d'}]},
  {elementType:'labels.text.fill',stylers:[{color:'#8ec3b9'}]},
  {elementType:'labels.text.stroke',stylers:[{color:'#1a3646'}]},
  {featureType:'landscape.natural',elementType:'geometry',stylers:[{color:'#023e58'}]},
  {featureType:'poi',elementType:'geometry',stylers:[{color:'#283d6a'}]},
  {featureType:'poi.park',elementType:'geometry.fill',stylers:[{color:'#023e58'}]},
  {featureType:'road',elementType:'geometry',stylers:[{color:'#304a7d'}]},
  {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#2c6675'}]},
  {featureType:'transit.line',elementType:'geometry.fill',stylers:[{color:'#283d6a'}]},
  {featureType:'transit.station',elementType:'geometry',stylers:[{color:'#3a4762'}]},
  {featureType:'water',elementType:'geometry',stylers:[{color:'#0e1626'}]},
];

const map = new google.maps.Map(document.getElementById('map'), {
  center: { lat: 31.5, lng: 34.85 }, zoom: 8,
  styles: DARK_STYLE,
  gestureHandling: 'cooperative',
  mapTypeControl: false,
  fullscreenControl: true,
});
const gInfoWindow = new google.maps.InfoWindow();
const gMarkers = [];  // track placed markers for zoomTo

// ── Load event data ───────────────────────────────────────────────────────────
async function loadEvent() {
  try {
    const enc   = encodeURIComponent(alertDate);
    const res   = await fetch(`/api/events?from=${enc}&to=${enc}&limit=1`);
    const events = await res.json();

    if (!events.length) throw new Error('האירוע לא נמצא במאגר');

    const ev = events[0];
    document.title = `אירוע ${fmtFull(ev.alertDate)}`;

    // ── Header ──
    document.getElementById('eventHeader').innerHTML = `
      <div class="event-title">
        <span class="time">${fmtTime(ev.alertDate)}</span>
        <span class="date">${fmtDate(ev.alertDate)}</span>
        <span class="cat-badge">${esc(ev.category_desc || '–')}</span>
      </div>
      <div class="loc-count">${ev.count} יישוב${ev.count !== 1 ? 'ים' : ''} באירוע זה</div>`;

    // ── Geocode & place markers ──
    await geocodeAndPlot(ev);

  } catch(err) {
    document.getElementById('overlayText').textContent   = '⚠️ ' + err.message;
    document.getElementById('overlaySubtext').textContent = '';
  }
}

// ── Geocode locations ─────────────────────────────────────────────────────────
let allLocations  = [];
let coordsMap     = {};   // name -> [lat,lng]

async function geocodeAndPlot(ev) {
  allLocations = ev.locations;
  const total  = allLocations.length;

  setText(`מגיאוקוד ${total} יישובים...`, 'הטעינה הראשונה עשויה לקחת מספר שניות');

  let round = 0;
  while (true) {
    round++;
    const namesParam = encodeURIComponent(allLocations.join(','));
    const res  = await fetch(`/api/geocode?names=${namesParam}`);
    const data = await res.json();
    const pending = data._pending || 0;
    delete data._pending;

    // Merge into coordsMap
    Object.assign(coordsMap, data);
    plotMarkers(ev);

    const placed = Object.keys(coordsMap).filter(k => coordsMap[k] !== null).length;

    if (pending === 0) {
      hideOverlay();
      updatePanel(ev);
      break;
    }

    setText(
      `נמצאו ${placed} מתוך ${total} יישובים`,
      `עוד ${pending} בתהליך גיאוקוד...`
    );

    await new Promise(r => setTimeout(r, 5000));
  }
}

// ── Plot markers ──────────────────────────────────────────────────────────────
let markersPlaced = false;

function plotMarkers(ev) {
  // Remove old markers
  gMarkers.forEach(m => m.setMap(null));
  gMarkers.length = 0;

  const bounds = new google.maps.LatLngBounds();
  let placed = 0;

  allLocations.forEach(name => {
    const coords = coordsMap[name];
    if (!coords) return;
    const [lat, lng] = coords;
    const marker = new google.maps.Marker({
      position: { lat, lng },
      map,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: '#c0392b', fillOpacity: 1,
        strokeColor: '#ff6666', strokeWeight: 2,
        scale: 10,
      },
    });
    marker.addListener('click', () => {
      gInfoWindow.setContent(`
        <div dir="rtl" style="font-family:'Segoe UI',Arial,sans-serif;padding:8px">
          <div style="font-size:.95rem;font-weight:700;color:#f0f0f0;margin-bottom:4px">📍 ${esc(name)}</div>
          <div style="color:#ff8888;font-size:.82rem">${fmtTime(ev.alertDate)}</div>
          <div style="color:#888;font-size:.78rem">${esc(ev.category_desc||'')}</div>
        </div>`);
      gInfoWindow.open(map, marker);
    });
    gMarkers.push({ marker, lat, lng, name });
    bounds.extend({ lat, lng });
    placed++;
  });

  if (placed && !markersPlaced) {
    markersPlaced = true;
    try {
      if (placed === 1) {
        map.setCenter(bounds.getCenter()); map.setZoom(13);
      } else {
        map.fitBounds(bounds, { top: 40, right: 40, bottom: 40, left: 40 });
        google.maps.event.addListenerOnce(map, 'bounds_changed', () => {
          if (map.getZoom() > 13) map.setZoom(13);
        });
      }
    } catch(e) {}
  }

  // Legend
  const missing = allLocations.length - placed;
  document.getElementById('legend').style.display = placed ? '' : 'none';
  document.getElementById('legendText').textContent =
    `${placed} יישובים על המפה` + (missing ? ` · ${missing} ללא מיקום` : '');
}

// ── Bottom panel ──────────────────────────────────────────────────────────────
function updatePanel(ev) {
  const panel = document.getElementById('panel');
  panel.style.display = '';
  document.getElementById('panelTitle').textContent =
    `${ev.count} יישובים באירוע — לחץ על יישוב לזום אליו`;

  const chips = allLocations.map(name => {
    const coords = coordsMap[name];
    const noCoords = !coords;
    return `<span class="loc-chip${noCoords?' no-coords':''}"
                  onclick="${noCoords ? '' : `zoomTo([${coords}],'${esc(name)}')`}"
                  title="${noCoords ? 'לא נמצאו קואורדינטות' : name}">
              ${esc(name)}
            </span>`;
  }).join('');

  document.getElementById('locChips').innerHTML = chips;
}

// ── Zoom to location ──────────────────────────────────────────────────────────
function zoomTo(coords, name) {
  const [lat, lng] = coords;
  map.setCenter({ lat, lng });
  map.setZoom(14);
  const found = gMarkers.find(m => Math.abs(m.lat - lat) < 0.001 && Math.abs(m.lng - lng) < 0.001);
  if (found) {
    gInfoWindow.open(map, found.marker);
    google.maps.event.trigger(found.marker, 'click');
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setText(main, sub='') {
  document.getElementById('overlayText').textContent    = main;
  document.getElementById('overlaySubtext').textContent = sub;
}
function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadEvent();
</script>
</body>
</html>
